async function initFirebase(){
  return new Promise(res=>{
    const s1=document.createElement('script');
    s1.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
    s1.onload=()=>{
      const s2=document.createElement('script');
      s2.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js';
      s2.onload=()=>{
        try{firebase.initializeApp(FB_CONFIG);db=firebase.database();console.log('FB OK');}catch(e){}
        res();
      };
      s2.onerror=()=>res();
      document.head.appendChild(s2);
    };
    s1.onerror=()=>res();
    document.head.appendChild(s1);
    setTimeout(res,5000); // timeout after 5s
  });
}

async function fbSave(data){
  try{localStorage.setItem('pchbwp_v3',JSON.stringify(data));}catch(e){}
  if(db){try{await db.ref('pms/data').set(data);}catch(e){}}
}
async function fbLoad(){
  if(db){try{const s=await db.ref('pms/data').get();if(s.exists())return s.val();}catch(e){}}
  try{const s=localStorage.getItem('pchbwp_v3');if(s)return JSON.parse(s);}catch(e){}

}

// ── Bill calc ─────────────────────────────────
function calcBill(b,kOrders,taxRate){
  const rate=b.customRate||b.baseRate;
  const roomCharge=rate*b.nights;
  const extras=(b.extraCharges||[]).reduce((s,x)=>s+x.amount,0);
  const kitchen=(kOrders||[]).filter(k=>k.bkId===b.id&&k.postedToBill).reduce((s,k)=>s+k.total,0);
  const subtotal=roomCharge+extras+kitchen;
  const tax=subtotal*(taxRate/100);
  return{rate,roomCharge,extras,kitchen,subtotal,tax,grand:Math.round(subtotal+tax)};
}

function printBill(b,g,kOrders,withTax,taxRate,hn){
  const{rate,roomCharge,extras,kitchen,subtotal,tax,grand}=calcBill(b,kOrders,withTax?taxRate:0);
  const bk=(kOrders||[]).filter(k=>k.bkId===b.id&&k.postedToBill);
  return hdr(hn)+`<h2>${withTax?'Tax Invoice (GST '+taxRate+'%)':'Settlement Bill (No Tax)'}</h2>
  <div class="s"><div class="st">Invoice</div>
    <div class="r"><span class="lb">No</span><span class="vl">${b.id}-${withTax?'TAX':'NOTAX'}</span></div>
    <div class="r"><span class="lb">Guest</span><span class="vl">${g.name}${g.company?' | '+g.company:''}</span></div>
    <div class="r"><span class="lb">Room</span><span class="vl">${b.room} · ${b.category}</span></div>
    <div class="r"><span class="lb">Stay</span><span class="vl">${b.checkIn} → ${b.checkOut} (${b.nights}n)</span></div>
  </div>
  <div class="s"><div class="st">Charges</div>
    <table><tr><th>Description</th><th style="text-align:right">PKR</th></tr>
    <tr><td>Room (${b.nights} × ${rate.toLocaleString()})</td><td style="text-align:right">${roomCharge.toLocaleString()}</td></tr>
    ${(b.extraCharges||[]).map(x=>`<tr><td>${x.desc}</td><td style="text-align:right">${x.amount.toLocaleString()}</td></tr>`).join('')}
    ${bk.map(k=>`<tr><td>Room Service ${k.time}</td><td style="text-align:right">${k.total.toLocaleString()}</td></tr>`).join('')}
    </table>
    <div class="tr" style="margin-top:6px"><span>Subtotal</span><span>${subtotal.toLocaleString()}</span></div>
    ${withTax?`<div class="tr"><span>GST ${taxRate}%</span><span>${Math.round(tax).toLocaleString()}</span></div>`:''}
    <div class="grand"><span>GRAND TOTAL</span><span>PKR ${grand.toLocaleString()}</span></div>
    <div style="font-size:10px;margin-top:4px">Payment: <b>${b.paid?'PAID':'PENDING'}</b></div>
  </div>
  <div class="sig" style="margin-top:16px"><div class="sb">Guest</div><div class="sb">Cashier</div></div>
  <div class="ftr">Printed: ${new Date().toLocaleString()}</div>`;
}

function doCheckin(bId){
  upd(d=>{
    const b=d.bookings.find(x=>x.id===bId);if(!b)return;
    const r=d.rooms.find(x=>x.id===b.room);if(!r)return;
    b.status='checked-in';b.paid=true;
    r.status='occupied';r.guest=b.guest;r.checkIn=b.checkIn;r.checkOut=b.checkOut;r.guestId=b.guestId;r.bkId=b.id;
    flash(b.guest+' checked in → Room '+b.room);
    setState({roomModal:null,sheet:null});
    const s=d.settings;if(s?.waNotifications){const n=(s.waNumber||'').replace(/\D/g,'');setTimeout(()=>window.open('https://wa.me/'+n+'?text='+encodeURIComponent('✅ CHECK-IN\nGuest: '+b.guest+'\nRoom: '+b.room+'\n'+b.checkIn+' → '+b.checkOut+'\nRate: '+fmt(b.customRate||b.baseRate)+'/night'),'_blank'),300);}
  });
}
function doCheckout(bId){
  upd(d=>{
    const b=d.bookings.find(x=>x.id===bId);if(!b)return;
    const{grand}=calcBill(b,d.kitchenOrders,d.settings?.taxRate||16);
    b.status='checked-out';
    const r=d.rooms.find(x=>x.id===b.room);if(r){r.status='cleaning';r.guest=null;r.checkIn=null;r.checkOut=null;r.guestId=null;r.bkId=null;}
    const g=d.guests.find(x=>x.id===b.guestId);if(g){g.stays++;g.totalSpent+=grand;}
    flash(b.guest+' checked out');setState({roomModal:null,sheet:null});
    const s=d.settings;if(s?.waNotifications){const n=(s.waNumber||'').replace(/\D/g,'');setTimeout(()=>window.open('https://wa.me/'+n+'?text='+encodeURIComponent('🔴 CHECK-OUT\nGuest: '+b.guest+'\nRoom: '+b.room+'\nTotal: '+fmt(grand)),'_blank'),300);}
  });
}
function doMarkClean(rId){upd(d=>{const r=d.rooms.find(x=>x.id===rId);if(r)r.status='available';});flash('Room '+rId+' available');setState({roomModal:null});}

function doQuickCheckin({guest,room,form:f}){
  const r=STATE.data.rooms.find(x=>x.id===room);if(!r)return;
  const nights=Math.max(1,Math.round((new Date(f.checkOut)-new Date(f.checkIn))/86400000));
  const cr=f.customRate?parseInt(f.customRate):null;
  const rate=cr||(r.customRate||r.baseRate);
  const bkId='BK-'+Date.now();
  let gId=guest.id;
  upd(d=>{
    if(guest.id==='__new__'){
      gId='G-'+Date.now();
      d.guests.push({id:gId,name:guest.name,email:'',phone:guest.phone||'',nationality:guest.nationality||'',idType:'CNIC',idNo:guest.idNo||'',dob:'',vip:false,stays:0,totalSpent:0,notes:'',tags:[guest.company?'Corporate':'New'],customRate:cr,company:guest.company||'',idPhoto:''});
    }
    d.bookings.push({id:bkId,guest:guest.name,guestId:gId,room:r.id,category:r.category,bedType:r.bedType,baseRate:r.baseRate,customRate:cr,nights,extraCharges:[],paid:true,status:'checked-in',source:f.source||'Direct',notes:f.notes||'',checkIn:f.checkIn,checkOut:f.checkOut});
    const rr=d.rooms.find(x=>x.id===r.id);
    rr.status='occupied';rr.guest=guest.name;rr.checkIn=f.checkIn;rr.checkOut=f.checkOut;rr.guestId=gId;rr.bkId=bkId;
    d.accounts.transactions.push({id:'TX-'+Date.now(),date:f.checkIn,desc:'Room '+r.id+' – '+guest.name+' ('+nights+'n)',type:'income',amount:rate*nights,category:'Room Revenue',ref:bkId});
    flash('✓ '+guest.name+' checked in → Room '+r.id);
    setState({quickCI:false,quickRoom:null,sheet:null});
  });
}

// ── HTML Helpers ──────────────────────────────
const h=(tag,attrs={},children=[])=>{const el=document.createElement(tag);Object.entries(attrs).forEach(([k,v])=>{if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else if(k.startsWith('on')&&typeof v==='function')el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='className')el.className=v;else el.setAttribute(k,v);});children.forEach(c=>{if(c==null||c===false||c===undefined)return;el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);});return el;};

function div(style,children=[]){return h('div',{style},children);}
function btn(text,onClick,style){const b=h('button',{style},typeof text==='string'?[text]:[text]);b.addEventListener('click',onClick);return b;}
function inp(value,onChange,attrs={}){const el=h('input',{value:value||'',...attrs});el.addEventListener('input',e=>onChange(e.target.value));return el;}
function sel(value,onChange,options){
  const el=h('select');
  options.forEach(([v,t])=>{const o=h('option',{value:v},[t||v]);if(v===value)o.selected=true;el.appendChild(o);});
  el.addEventListener('change',e=>onChange(e.target.value));
  return el;
}
function lbl(text){return h('div',{style:{fontSize:10,color:T.muted,letterSpacing:'0.14em',textTransform:'uppercase',marginBottom:5,fontWeight:700}},[text]);}
function slbl(text){return h('div',{style:{fontSize:11,color:T.sub,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:10,fontWeight:700,borderBottom:`1px solid ${T.border}`,paddingBottom:7}},[text]);}
function badge(s){const c=SC[s]||T.muted;return h('span',{style:{fontSize:9,padding:'2px 8px',borderRadius:12,background:c+'22',color:c,border:`1px solid ${c}44`,fontWeight:700,letterSpacing:'0.08em',textTransform:'capitalize'}},[s]);}
function tag2(text,c){return h('span',{style:{fontSize:9,padding:'2px 8px',borderRadius:12,background:c+'22',color:c,border:`1px solid ${c}44`,fontWeight:700}},[text]);}
function kpi(label,value,color,sub){
  return div({...styles.card,flex:1},[
    lbl(label),
    h('div',{style:{fontSize:19,fontWeight:800,color:color||T.text}},[String(value)]),
    sub&&h('div',{style:{fontSize:10,color:T.muted,marginTop:3}},[sub])
  ]);
}
function fieldRow(ltext,val,onChange,type='text',placeholder=''){
  return div({marginBottom:12},[lbl(ltext),inp(val,onChange,{type,placeholder})]);
}

  if(qStep===2&&qGuest){
    inner.appendChild(div({...styles.surface,marginBottom:12,display:'flex',gap:10,alignItems:'center',background:T.accent+'11',border:`1px solid ${T.accent}33`},[
      div({width:34,height:34,borderRadius:'50%',background:T.accent+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:900,color:T.accent,flexShrink:0},[qGuest.name.split(' ').map(n=>n[0]).join('')]),
      div({flex:1},[h('div',{style:{fontSize:13,fontWeight:800}},[qGuest.name]),h('div',{style:{fontSize:11,color:T.sub}},[qGuest.id==='__new__'?'New Guest':'From portfolio'])]),
      btn('Change',()=>{STATE.qStep=1;render();},{background:'none',border:'none',color:T.accent,fontSize:11,cursor:'pointer',fontWeight:700})
    ]));

    if(qGuest.id==='__new__'){
      const nf=div({...styles.surface,marginBottom:12});
      nf.appendChild(slbl('New Guest Details'));
      ['name','phone','idNo','nationality','company'].forEach(k=>{
        const labels={name:'Full Name',phone:'Phone',idNo:'CNIC/Passport',nationality:'Nationality',company:'Company (optional)'};
        const lEl=lbl(labels[k]);
        const iEl=inp(qGuest[k]||'',v=>{STATE.qGuest={...STATE.qGuest,[k]:v};render();});
        nf.appendChild(div({marginBottom:10},[lEl,iEl]));
      });
      inner.appendChild(nf);
    }

    const avail=d.rooms.filter(r=>r.status==='available');
    inner.appendChild(div({marginBottom:12},[lbl('Room *'),sel(qRoom,v=>{STATE.quickRoom=parseInt(v)||null;render();STATE.quickRoom=parseInt(v)||null;},[['','Select available room'],...avail.map(r=>[String(r.id),'Room '+r.id+' — '+r.category+' '+r.bedType+' ('+fmt(r.customRate||r.baseRate)+'/n)'])])]));

    const grid=div({display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12});
    const ci=inp(qForm.checkIn,v=>{STATE.qForm={...STATE.qForm,checkIn:v};render();},{type:'date'});
    const co=inp(qForm.checkOut,v=>{STATE.qForm={...STATE.qForm,checkOut:v};render();},{type:'date'});
    grid.appendChild(div({},[lbl('Check-In *'),ci]));
    grid.appendChild(div({},[lbl('Check-Out *'),co]));
    inner.appendChild(grid);

    inner.appendChild(div({marginBottom:12},[lbl('Custom Rate (blank = standard)'),inp(qForm.customRate,v=>{STATE.qForm={...STATE.qForm,customRate:v};render();},{type:'number',placeholder:'Standard rate if blank'})]));
    inner.appendChild(div({marginBottom:12},[lbl('Source'),sel(qForm.source||'Direct',v=>{STATE.qForm={...STATE.qForm,source:v};render();},['Direct','OTA','Corporate','Walk-in','Phone'].map(s=>[s,s]))]));
    inner.appendChild(div({marginBottom:12},[lbl('Notes'),inp(qForm.notes||'',v=>{STATE.qForm={...STATE.qForm,notes:v};render();})]));

    const sr=d.rooms.find(r=>r.id===parseInt(qRoom));
    if(sr&&qForm.checkOut){
      const nights=Math.max(1,Math.round((new Date(qForm.checkOut)-new Date(qForm.checkIn))/86400000));
      const rate=qForm.customRate?parseInt(qForm.customRate):(sr.customRate||sr.baseRate);
      inner.appendChild(div({...styles.surface,marginBottom:14},[
        div({display:'flex',justifyContent:'space-between',marginBottom:4},[h('span',{style:{fontSize:11,color:T.muted}},['Room × '+nights+'n']),h('span',{style:{fontWeight:700,color:T.gold}},[fmt(rate*nights)])]),
        div({display:'flex',justifyContent:'space-between'},[h('span',{style:{fontSize:11,color:T.muted}},['With 16% GST']),h('span',{style:{fontWeight:700,color:T.accent}},[fmt(Math.round(rate*nights*1.16))])])
      ]));
    }

    inner.appendChild(div({display:'flex',gap:10},[
      btn('← Back',()=>{STATE.qStep=1;render();},{background:T.border,border:'none',borderRadius:8,color:T.muted,flex:1,padding:'9px',fontWeight:700,cursor:'pointer'}),
      btn('✓ Confirm Check-In',()=>{
        if(!qRoom||!qForm.checkOut)return flash('Select room and dates',true);
        doQuickCheckin({guest:qGuest,room:parseInt(qRoom),form:qForm});
        STATE.qStep=1;STATE.qSearch='';STATE.qGuest=null;STATE.qForm=null;
      },{background:!qRoom||!qForm.checkOut?T.border:T.green,border:'none',borderRadius:8,color:!qRoom||!qForm.checkOut?T.muted:'#fff',flex:2,padding:'12px',fontSize:13,fontWeight:700,cursor:'pointer'})
    ]));
  }

  overlay.appendChild(inner);
  return overlay;
}

// ── Print preview ─────────────────────────────
function renderPrintModal(){
  const doc=STATE.printDoc;if(!doc)return null;
  const overlay=div({position:'fixed',inset:0,background:'#000d',zIndex:800,display:'flex',flexDirection:'column'});
  const bar=div({background:'#111',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 16px',flexShrink:0},[
    h('span',{style:{color:'#fff',fontWeight:700,fontSize:14}},['🖨 Print Preview']),
    div({display:'flex',gap:10},[
      btn('🖨 Print / Save PDF',null,{background:'#4f8ef7',border:'none',borderRadius:8,color:'#fff',padding:'8px 20px',fontWeight:700,fontSize:14,cursor:'pointer'}),
      btn('✕ Close',()=>setState({printDoc:null}),{background:'#333',border:'none',borderRadius:8,color:'#aaa',padding:'8px 16px',fontWeight:700,cursor:'pointer'})
    ])
  ]);
  const iframe=h('iframe',{srcdoc:doc,style:{flex:1,border:'none',background:'#fff'},title:'print'});
  bar.querySelector('button').addEventListener('click',()=>{iframe.contentWindow.focus();iframe.contentWindow.print();});
  overlay.appendChild(bar);overlay.appendChild(iframe);
  return overlay;
}

// ── Login ─────────────────────────────────────
function renderLogin(){
  const d=STATE.data;
  let u='',p='',err='';
  const el=div({minHeight:'100vh',background:T.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:20},[
    div({...styles.card,width:'100%',maxWidth:360,padding:32},[
      div({textAlign:'center',marginBottom:28},[
        div({width:56,height:56,borderRadius:14,background:T.accent,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,fontWeight:900,color:'#fff',margin:'0 auto 12px'},['P']),
        h('div',{style:{fontSize:22,fontWeight:900}},['PCH BWP']),
        h('div',{style:{fontSize:11,color:T.muted,textTransform:'uppercase',letterSpacing:'0.1em',marginTop:2}},['Hotel PMS · Cloud'])
      ])
    ])
  ]);
  const card=el.querySelector('[style*="max-width"]');
  const uf=div({marginBottom:12},[lbl('Username')]);const ui=inp('',v=>{u=v;});uf.appendChild(ui);card.appendChild(uf);
  const pf=div({marginBottom:20},[lbl('Password')]);const pi=inp('',v=>{p=v;},{type:'password'});pf.appendChild(pi);card.appendChild(pf);
  const errEl=h('div',{style:{fontSize:11,color:T.red,marginBottom:12,textAlign:'center',display:'none'}});card.appendChild(errEl);
  const go=()=>{
    const usr=d.users.find(x=>x.username===u.trim()&&x.password===p&&x.active);
    if(usr){setState({user:usr,tab:'dashboard'});}
    else{const ex=d.users.find(x=>x.username===u.trim());errEl.textContent=!ex?'Username not found':!ex.active?'User is disabled':'Wrong password';errEl.style.display='block';}
  };
  ui.addEventListener('keydown',e=>e.key==='Enter'&&go());
  pi.addEventListener('keydown',e=>e.key==='Enter'&&go());
  const lb=btn('Login',go,{background:T.accent,border:'none',borderRadius:8,color:'#fff',width:'100%',padding:'12px',fontSize:14,fontWeight:700,cursor:'pointer'});
  card.appendChild(lb);
  card.appendChild(h('div',{style:{fontSize:10,color:T.muted,textAlign:'center',marginTop:14}},['Admin: bobby / admin123']));
  card.appendChild(h('div',{style:{fontSize:10,color:T.sub,textAlign:'center',marginTop:4}},[d.users.length+' user'+(d.users.length!==1?'s':'')+' registered']));
  return el;
}

// ── TABS CONFIG ───────────────────────────────
const TABS=[
  {id:'dashboard',icon:'⊞',label:'Home',perm:'dashboard',render:renderDashboard},
  {id:'rooms',icon:'🏨',label:'Rooms',perm:'rooms',render:renderRooms},
  {id:'bookings',icon:'📋',label:'Bookings',perm:'bookings',render:renderBookings},
  {id:'guests',icon:'👤',label:'Guests',perm:'guests',render:renderGuests},
  {id:'kitchen',icon:'🍽',label:'Kitchen',perm:'kitchen',render:renderKitchen},
  {id:'employees',icon:'👥',label:'Staff',perm:'employees',render:renderEmployees},
  {id:'accounts',icon:'💰',label:'Accounts',perm:'accounts',render:renderAccounts},
  {id:'reports',icon:'📊',label:'Reports',perm:'reports',render:renderReports},
  {id:'users',icon:'🔑',label:'Users',perm:'users',render:renderUsers},
  {id:'settings',icon:'⚙️',label:'Settings',perm:'settings',render:renderSettings},
];

// ── Main render ────────────────────────────────
function render(){
  const root=document.getElementById('app');
  root.innerHTML='';

  if(STATE.loading){root.appendChild(div({minHeight:'100vh',background:T.bg,display:'flex',alignItems:'center',justifyContent:'center'},[h('div',{style:{color:T.muted,fontSize:14}},['Loading...'])]));return;}
  if(!STATE.user){root.appendChild(renderLogin());return;}

  const hasPerm=p=>STATE.user?.isAdmin||STATE.user?.permissions?.includes(p);
  const vtabs=TABS.filter(t=>hasPerm(t.perm));

  // Wrapper
  const wrap=div({fontFamily:'system-ui,sans-serif',background:T.bg,minHeight:'100vh',color:T.text,paddingBottom:60});

  // Toast
  if(STATE.toast){const t=h('div',{className:'toast',style:{background:STATE.toast.err?'#5c1a1a':'#0d3320',color:STATE.toast.err?'#fca5a5':'#6ee7b7'}},[STATE.toast.err?'⚠ '+STATE.toast.msg:'✓ '+STATE.toast.msg]);wrap.appendChild(t);}

  // Header
  const hdr2=div({background:T.surface,borderBottom:`1px solid ${T.border}`,padding:'11px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:200},[
    div({display:'flex',alignItems:'center',gap:10},[
      div({width:32,height:32,borderRadius:8,background:T.accent,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:900,color:'#fff'},['P']),
      div({},[h('div',{style:{fontWeight:900,fontSize:14}},['PCH BWP']),h('div',{style:{fontSize:9,color:T.muted,letterSpacing:'0.16em',textTransform:'uppercase'}},['Hotel PMS'])])
    ]),
    div({display:'flex',alignItems:'center',gap:8},[
      h('span',{style:{fontSize:10,color:T.muted}},[STATE.user.name]),
      STATE.user.isAdmin&&tag2('ADMIN',T.gold),
      btn('Out',()=>setState({user:null,tab:'dashboard'}),{background:T.border,border:'none',borderRadius:8,color:T.muted,padding:'5px 10px',fontSize:11,cursor:'pointer'})
    ])
  ]);
  wrap.appendChild(hdr2);

  // Tab bar
  const tabBar=div({background:T.surface,borderBottom:`1px solid ${T.border}`,overflowX:'auto',display:'flex',scrollbarWidth:'none'});
  vtabs.forEach(t=>{
    const tb=h('button',{className:'tab-btn'+(t.id===STATE.tab?' active':'')},[h('span',{style:{fontSize:15}},[t.icon]),t.label]);
    tb.addEventListener('click',()=>setState({tab:t.id,detail:null}));
    tabBar.appendChild(tb);
  });
  wrap.appendChild(tabBar);

  // Content
  const activeTab=vtabs.find(t=>t.id===STATE.tab)||vtabs[0];
  if(activeTab)wrap.appendChild(activeTab.render());

  // Modals
  const rm=renderRoomModal();if(rm)wrap.appendChild(rm);
  const qci=renderQuickCI();if(qci)wrap.appendChild(qci);
  const sh=renderSheet();if(sh)wrap.appendChild(sh);
  const pm=renderPrintModal();if(pm)wrap.appendChild(pm);

  root.appendChild(wrap);
}

// ── Boot ──────────────────────────────────────
(async()=>{
  render(); // show loading
  await initFirebase();
  let data=await fbLoad();
  if(!data){data=makeData();}
  else{
    if(!data.users)data.users=makeData().users;
    else if(!data.users.find(u=>u.username==='bobby'))data.users.unshift(makeData().users[0]);
  }
  STATE.data=data;
  STATE.loading=false;
  render();
})();
</script>
